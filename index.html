<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f8f9fb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#181825" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyPad++">
  <meta name="description" content="MyPad++ — A powerful code editor for Android tablets with syntax highlighting, multi-tab support, and WebDAV integration.">
  <meta name="mobile-web-app-capable" content="yes">

  <title>MyPad++</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./src/index.css">
</head>
<body>
  <div id="app">
    <header id="toolbar-container"></header>
    <div id="tab-bar-container"></div>
    <main id="workspace">
      <aside id="sidebar-container"></aside>
      <div id="editor-layout-wrapper" style="flex: 1; display: flex; flex-direction: row; min-width: 0; min-height: 0; position: relative;">
        <div id="editor-container"></div>
        <div id="compare-container" style="display: none; flex: 1; min-width: 0;"></div>
      </div>
    </main>
    <div id="symbol-bar-container"></div>
    <footer id="statusbar-container"></footer>
  </div>

  <div id="dialog-overlay"></div>
  <div id="context-menu-container"></div>

  <noscript>
    <p style="text-align:center; padding:2rem; font-family:sans-serif;">
      MyPad++ requires JavaScript to run. Please enable JavaScript in your browser settings.
    </p>
  </noscript>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
